<form class="mt-3">

    <div class="mb-3">
      <label for="email" class="form-label">Email cím</label>
      <input type="email" class="form-control" id="email" placeholder="name@example.com">
    </div>
    
    <div class="mb-3">
      <label for="username" class="form-label">Felhasználónév</label>
      <input type="text" class="form-control" id="username" >
    </div>

    <div>
        <label for="inputPassword5" class="form-label">Jelszó</label>
        <input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
    </div>
        
    <button class="btn regiserloginbtn mt-3" type="submit">Regisztráció</button>
    
</form>

@if(!registerMode){
    <div class="mt-3">
        <p>Nem rendelkezel fiókkal? <button (click)="registerMode = true" class="switchlogin">Regisztrálok!</button></p>
    </div> 
}

@if(registerMode){
<div class="mt-3">
    <p>Rendelkezel fiókkal? <button (click)="registerMode = false" class="switchlogin">Bejelentkezek!</button></p>
</div>
}
