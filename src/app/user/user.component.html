@if(!isLoggedIn()){
    <form class="mt-3" [formGroup]="userForm" (ngSubmit)="submit()">

        <div class="mb-3 form-floating">
            <input formControlName="email" type="email" class="form-control" id="email" placeholder="name@example.com">
            <label for="email" class="form-label">Email address</label> 
        </div>
        
        @if(registerMode){
            <div class="mb-3 form-floating">
                <input formControlName="name" type="text" class="form-control" id="name" >
                <label for="name" class="form-label">Username</label>
            </div>
        }

        <div class="mb-3 form-floating">
            <input formControlName="password" type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
            <label for="inputPassword5" class="form-label">Password</label>
        </div>
        
        @if(registerMode){
            <div class="mb-3 form-floating">
                <input formControlName="password_confirmation" type="password" id="inputPassword6" class="form-control" aria-describedby="passwordHelpBlock">
                <label for="inputPassword6" class="form-label">Confirm Password</label>
            </div>
        }

        <button class="btn mt-3" type="submit"> {{ registerMode ? 'Registration' : 'Login' }}</button>

    </form>

    @if(this.errorMessage != ''){
        <div class="alert alert-danger mt-3" role="alert">
            {{ errorMessage }}
        </div>
    }




    @if(!registerMode){
        <div class="mt-3">
            <p>Don't you have an account? <button (click)="registerMode = true" class="switchlogin">Register!</button></p>
        </div> 
    }

    @if(registerMode){
    <div class="mt-3">
        <p>Already have an account? <button (click)="registerMode = false" class="switchlogin">Login!</button></p>
    </div>
    }
}

@if(isLoggedIn()){
    <div class="mt-3">
        <p>Welcome!</p>
        <button (click)="logout()" class="btn mt-3">Logout</button>
    </div>
}
